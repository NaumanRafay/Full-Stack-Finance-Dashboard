{% extends "layout.html" %}
{% block title %}Add Cash{% endblock %}
{% block main %}
<h2>Add Cash to Account</h2>
<form action="/addcash" method="post">
<div class="mb-3">
<input class="form-control" name="amount" placeholder="Amount" type="number" step="0.01" min="1" required>
</div>
<button class="btn btn-success" type="submit">Add</button>
</form>
{% endblock %}
