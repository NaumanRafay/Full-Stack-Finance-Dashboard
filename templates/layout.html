<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finance: {% block title %}{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/static/styles.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-md navbar-dark bg-dark">
<div class="container-fluid">
<a class="navbar-brand" href="/">CS50 Finance</a>
<div class="collapse navbar-collapse">
<ul class="navbar-nav me-auto">
{% if session["user_id"] %}
<li class="nav-item"><a class="nav-link" href="/quote">Quote</a></li>
<li class="nav-item"><a class="nav-link" href="/buy">Buy</a></li>
<li class="nav-item"><a class="nav-link" href="/sell">Sell</a></li>
<li class="nav-item"><a class="nav-link" href="/history">History</a></li>
<li class="nav-item"><a class="nav-link" href="/addcash">Add Cash</a></li>
<li class="nav-item"><a class="nav-link" href="/changepassword">Change Password</a></li>
{% endif %}
</ul>
<ul class="navbar-nav ms-auto">
{% if session["user_id"] %}
<li class="nav-item"><a class="nav-link" href="/logout">Log Out</a></li>
{% else %}
<li class="nav-item"><a class="nav-link" href="/login">Log In</a></li>
<li class="nav-item"><a class="nav-link" href="/register">Register</a></li>
{% endif %}
</ul>
</div>
</div>
</nav>
<main class="container py-5">
{% block main %}{% endblock %}
</main>
</body>
</html>
