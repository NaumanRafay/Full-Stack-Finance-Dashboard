{% extends "layout.html" %}
{% block title %}Change Password{% endblock %}
{% block main %}
<h2>Change Password</h2>
<form action="/changepassword" method="post">
<div class="mb-3">
<input class="form-control" name="old" placeholder="Old Password" type="password" required>
</div>
<div class="mb-3">
<input class="form-control" name="new" placeholder="New Password" type="password" required>
</div>
<button class="btn btn-warning" type="submit">Change</button>
</form>
{% endblock %}
